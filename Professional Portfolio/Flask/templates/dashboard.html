{% extends 'base.html' %}

{% block content %}
    <h2>Project Dashboard</h2>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Deadline</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for project in projects %}
                <tr>
                    <td>{{ project.project_id }}</td>
                    <td>{{ project.name }}</td>
                    <td>{{ project.description }}</td>
                    <td>{{ project.status }}</td>
                    <td>{{ project.deadline }}</td>
                    <td>
                        <a href="{{ url_for('create_or_edit_project', project_id=project.project_id) }}" class="btn btn-warning btn-sm">Edit</a>  <!-- Button to edit the project -->
                        <form action="{{ url_for('delete_project', project_id=project.project_id) }}" method="POST" class="inline-form">  <!-- Form to delete the project -->
                            <input type="submit" class="btn btn-danger btn-sm" value="Delete">  <!-- Delete button -->
                        </form>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
